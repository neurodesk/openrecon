name: build-apps

on:
  workflow_call:
    inputs:
      applications:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      applications:
        description: JSON array of application names to build
        required: true
        default: '["musclemap"]'
        type: string

jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        application: ${{ fromJSON(inputs.applications) }}
    permissions:
      id-token: write
      contents: read
    outputs:
      BUILDDATE: ${{ steps.ENVVARS.outputs.BUILDDATE }}
      IMAGENAME: ${{ steps.IMAGEVARS.outputs.IMAGENAME }}
      FIRE_IMAGENAME: ${{ steps.IMAGEVARS.outputs.FIRE_IMAGENAME }}
    steps:
      - uses: actions/checkout@v5
      - name: Set environment variables
        id: ENVVARS
        run: |
          APPLICATION=${{ matrix.application }}
          BUILDDATE=$(date +%Y%m%d)
          echo "APPLICATION=$APPLICATION" >> "$GITHUB_ENV"
          echo "BUILDDATE=$BUILDDATE" >> "$GITHUB_ENV"
          echo "BUILDDATE=$BUILDDATE" >> "$GITHUB_OUTPUT"
      - name: Build recipes
        run: |
          echo "APPLICATION: $APPLICATION"
          python3 -m venv .venv
          source .venv/bin/activate
          cd "recipes/$APPLICATION"
          command -v python3
          BUILD_PACKAGE_SELECTION=both /bin/bash ../build.sh
      - name: Set artifact variables
        id: IMAGEVARS
        run: |
          echo "finding bundle files for $APPLICATION:"
          OPENRECON_ZIPFILE=$(find "./recipes/$APPLICATION/openrecon" -maxdepth 1 -type f -iname "OpenRecon_*.zip" 2>/dev/null | head -1)
          # The build now emits the FIRE bundle as a *folder*; locate it so we can zip it for upload.
          FIRE_BUNDLE_DIR=$(find "./recipes/$APPLICATION/fire" -maxdepth 1 -type d -iname "FIRE_*" 2>/dev/null | head -1)
          if [ -z "$OPENRECON_ZIPFILE" ] || [ -z "$FIRE_BUNDLE_DIR" ]; then
            echo "Missing expected build output(s)"
            echo "OPENRECON_ZIPFILE=$OPENRECON_ZIPFILE"
            echo "FIRE_BUNDLE_DIR=$FIRE_BUNDLE_DIR"
            echo "Available package files:"
            find "./recipes/$APPLICATION" -maxdepth 3 \( -iname "OpenRecon_*.zip" -o -iname "FIRE_*" \) -print
            exit 1
          fi
          # Zip the FIRE bundle folder for distribution. Archive the folder *contents* so
          # the layout (Ice/, INSTALL_FIRE.txt, ...) sits at the archive root, matching the
          # documented install steps and the downstream S3 upload.
          FIRE_ZIPFILE="${FIRE_BUNDLE_DIR}.zip"
          FIRE_ZIPFILE_ABS="$(cd "$(dirname "$FIRE_ZIPFILE")" && pwd)/$(basename "$FIRE_ZIPFILE")"
          rm -f "$FIRE_ZIPFILE_ABS"
          echo "Zipping FIRE bundle folder '$FIRE_BUNDLE_DIR' -> '$FIRE_ZIPFILE'"
          ( cd "$FIRE_BUNDLE_DIR" && shopt -s dotglob && 7z a -tzip -mm=Deflate "$FIRE_ZIPFILE_ABS" -- * >/dev/null )
          IMAGENAME=$(basename "$OPENRECON_ZIPFILE" .zip)
          FIRE_IMAGENAME=$(basename "$FIRE_ZIPFILE" .zip)
          echo "OPENRECON_ZIPFILE: $OPENRECON_ZIPFILE"
          echo "FIRE_ZIPFILE: $FIRE_ZIPFILE"
          echo "IMAGENAME: $IMAGENAME"
          echo "FIRE_IMAGENAME: $FIRE_IMAGENAME"
          {
            echo "OPENRECON_ZIPFILE=$OPENRECON_ZIPFILE"
            echo "FIRE_ZIPFILE=$FIRE_ZIPFILE"
            echo "ZIPFILE=$OPENRECON_ZIPFILE"
            echo "IMAGENAME=$IMAGENAME"
            echo "FIRE_IMAGENAME=$FIRE_IMAGENAME"
          } >> "$GITHUB_ENV"
          {
            echo "IMAGENAME=$IMAGENAME"
            echo "FIRE_IMAGENAME=$FIRE_IMAGENAME"
          } >> "$GITHUB_OUTPUT"
      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name : Upload zip files
        run: /bin/bash .github/workflows/upload-zip.sh "$OPENRECON_ZIPFILE" "$FIRE_ZIPFILE"
      - name: Generate job output
        run: |
          {
            echo "The OpenRecon and FIRE bundles were built successfully. To test them, download:"
            echo ""
            echo "curl -O https://openrecon.s3.us-east-2.amazonaws.com/${IMAGENAME}.zip"
            echo "curl -O https://openrecon.s3.us-east-2.amazonaws.com/${FIRE_IMAGENAME}.zip"
            echo ""
            printf '%s\n' '# OpenRecon zip: copy to C:\Program Files\Siemens\Numaris\OperationalManagement\FileTransfer\incoming'
            printf '%s\n' '# FIRE zip: unpack and copy/merge the Ice folder into MriCustomer as described in INSTALL_FIRE.txt'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate issue for new container to test and release
        env:
          GH_TOKEN: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
        run: |
          # shellcheck disable=SC2016
          {
            printf '%s\n' "The OpenRecon and FIRE bundles were successfully built by @${{ github.actor }}. To test them, download:"
            printf '\n'
            printf '%s\n' '```bash'
            printf '%s\n' "curl -O https://openrecon.s3.us-east-2.amazonaws.com/${IMAGENAME}.zip"
            printf '%s\n' '```'
            printf '\n'
            printf '%s\n' 'For OpenRecon, copy the zip file to C:\Program Files\Siemens\Numaris\OperationalManagement\FileTransfer\incoming.'
            printf '\n'
            printf '%s\n' 'On scanners that can download files directly, open an administrator PowerShell, navigate to that `incoming` folder, and run:'
            printf '\n'
            printf '%s\n' '```powershell'
            printf '%s\n' "curl.exe -k -O https://openrecon.s3.us-east-2.amazonaws.com/${IMAGENAME}.zip"
            printf '%s\n' '```'
            printf '\n'
            printf '%s\n' 'For FIRE:'
            printf '\n'
            printf '%s\n' '```bash'
            printf '%s\n' "curl -O https://openrecon.s3.us-east-2.amazonaws.com/${FIRE_IMAGENAME}.zip"
            printf '%s\n' '```'
            printf '\n'
            printf '%s\n' 'To install the FIRE package, unpack the zip and copy/merge the `Ice` folder into `MriCustomer` as described in `INSTALL_FIRE.txt`.'
            printf '\n'
            printf '%s\n' 'once tested upload to https://webclient.au.api.teamplay.siemens-healthineers.com/ and make available to all institutes.'
            printf '\n'
            printf '%s\n' 'Please close this issue when completed :)'
          } > issue-body.md
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "New container ${IMAGENAME} / ${FIRE_IMAGENAME}" \
            --label enhancement \
            --body-file issue-body.md
