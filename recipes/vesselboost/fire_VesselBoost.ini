[OpenRecon]
; Server IP address
hostname=192.168.2.2

; Server port number
port=9002

; ----------------------------------------------------------
[chroot]
; Enable starting of chroot process on MARS
start_chroot=true

; Path containing chroot file on MARS
chroot_image_path=%MRICUSTOMER%/ice/fire/chroot/FIRE_neurodesk_vesselboost_V2_0_29

; Chroot image file name
chroot_image_name=FIRE_neurodesk_vesselboost_V2_0_29.img

; Command to start chroot process (relative to inside the chroot image)
; chroot_command=/opt/code/python-ismrmrd-server/sync-code-and-start-fire-python-server.sh /tmp/share/log/python_ismrmrd_server_`date '+%Y%m%d_%H%M%S'`.log
; chroot_command=/opt/code/python-ismrmrd-server/start-fire-python-server-with-data-storage.sh /tmp/share/log/python_ismrmrd_server_`date '+%Y%m%d_%H%M%S'`.log
; chroot_command=/opt/code/python-ismrmrd-server/start-fire-python-server.sh /tmp/share/log/python_ismrmrd_server_`date '+%Y%m%d_%H%M%S'`.log

chroot_command=/usr/local/bin/start-fire-openrecon.sh /tmp/share/log/python_ismrmrd_server_`date '+%Y%m%d_%H%M%S'`.log

; Process name of chroot process (used to determine if server is started correctly)
chroot_search_string=python3

; Stop chroot process after image reconstruction is complete (chroot image is still mounted)
chroot_stop_after_finish=true

; Maximum residual memory usage by chroot process after image reconstruction is complete.  Process is stopped if exceeded
chroot_allowable_residual_memory_usage=128

; Mount MARS CUDA drivers into chroot
chroot_mount_cuda=false
